apiVersion: apps/v1\nkind: Deployment\nmetadata:\n  name: flask-app-deployment\nspec:\n  replicas: 3\n  selector:\n    matchLabels:\n      app: flask-app\n  template:\n    metadata:\n      labels:\n        app: flask-app\n    spec:\n      containers:\n      - name: flask-app\n        image: your-docker-repo/flask-app:latest\n        ports:\n        - containerPort: 5000\n---\napiVersion: v1\nkind: Service\nmetadata:\n  name: flask-app-service\nspec:\n  type: LoadBalancer\n  ports:\n  - port: 80\n    targetPort: 5000\n  selector:\n    app: flask-app