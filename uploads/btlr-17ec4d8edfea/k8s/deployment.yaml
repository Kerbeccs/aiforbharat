apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-django-app
  labels:
    app: flask-django-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-django-app
  template:
    metadata:
      labels:
        app: flask-django-app
    spec:
      containers:
      - name: flask-django-app
        image: {IMAGE_URI}
        ports:
        - containerPort: 5000
